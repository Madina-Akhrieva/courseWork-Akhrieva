services:
  postgres:
    image: postgres:16-alpine
    container_name: edu_analytics_db
    environment:
      POSTGRES_DB: edu_analytics
      POSTGRES_USER: edu_admin
      POSTGRES_PASSWORD: edu_admin

    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U edu_admin"]
      interval: 10s
      timeout: 5s
      retries: 5
      

  education_server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: edu_analytics_server
    environment:
      APP_DB_URL: jdbc:postgresql://postgres:5432/edu_analytics
      APP_DB_USER: edu_admin
      APP_DB_PASSWORD: edu_admin
      APP_SERVER_HOST: 0.0.0.0
      APP_SERVER_PORT: 5050
      APP_SERVER_THREADS: 16
    ports:
      - "5050:5050"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
